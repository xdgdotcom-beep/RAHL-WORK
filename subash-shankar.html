<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Final Touches</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0c;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: #121216;
      padding: 50px 40px;
      border: 1px solid #222;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      max-width: 450px;
      width: 90%;
    }

    .icon-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }

    .gear {
      width: 100%;
      height: 100%;
      border: 3px dashed #4caf50;
      border-radius: 50%;
      animation: spin 8s linear infinite;
    }

    .inner-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      background: #4caf50;
      border-radius: 50%;
      box-shadow: 0 0 15px #4caf50;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
      color: #fff;
    }

    p {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .progress-container {
      background: #1a1a20;
      border-radius: 4px;
      height: 6px;
      width: 100%;
      overflow: hidden;
      position: relative;
      border: 1px solid #2a2a30;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2e7d32, #4caf50);
      border-radius: 4px;
      animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 0 10px #4caf50;
    }

    .status-text {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    @keyframes loadProgress {
      0% { width: 0%; }
      70% { width: 85%; }
      100% { width: 95%; } /* Stops at 95% to show it's almost done */
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-wrapper">
      <div class="gear"></div>
      <div class="inner-circle"></div>
    </div>
    
    <h1>Final Touches</h1>
    <p>We are currently deploying the final updates and optimizing the system. Operations will resume shortly.</p>
    
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    <div class="status-text">
      <span>System Update</span>
      <span>95%</span>
    </div>
  </div>

</body>
</html>
