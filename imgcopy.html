<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub /images Link Copier</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161820;
      --border: #252733;
      --accent: #f0c040;
      --accent2: #e05a5a;
      --text: #e8eaf0;
      --muted: #6b7080;
      --success: #4ade80;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
    }

    header {
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 10px;
      margin-bottom: 14px;
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* Input section */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #0d0f14;
      border: none;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover { color: var(--text); border-color: var(--muted); }

    .hint {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .hint code {
      color: var(--accent);
      background: rgba(240,192,64,0.08);
      padding: 1px 5px;
    }

    /* Status bar */
    .status-bar {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      animation: fadeUp 0.6s 0.2s ease both;
      min-height: 24px;
    }

    .status-bar .count { color: var(--accent); font-weight: 700; }

    /* Image grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card.copied { border-color: var(--success); }

    .thumb-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
      transition: opacity 0.3s;
    }

    .thumb-wrap .img-placeholder {
      font-size: 32px;
      opacity: 0.2;
    }

    .card-body {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
    }

    .filename {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    .copy-url {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .copy-btn {
      width: 100%;
      background: rgba(240,192,64,0.08);
      border: 1px solid rgba(240,192,64,0.2);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .copy-btn:hover { background: rgba(240,192,64,0.15); }

    .card.copied .copy-btn {
      background: rgba(74,222,128,0.1);
      border-color: rgba(74,222,128,0.3);
      color: var(--success);
    }

    .copied-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--success);
      color: #0d0f14;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 3px 7px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card.copied .copied-badge { opacity: 1; }

    /* Empty / loading states */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      animation: fadeUp 0.5s ease both;
    }

    .state-box .icon { font-size: 36px; margin-bottom: 14px; opacity: 0.4; }
    .state-box p { line-height: 1.7; }

    .error-box {
      background: rgba(224,90,90,0.08);
      border: 1px solid rgba(224,90,90,0.3);
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
    }

    /* Loading spinner */
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--success);
      color: #0d0f14;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      padding: 10px 18px;
      letter-spacing: 0.08em;
      transform: translateY(20px);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge">⬡ GitHub Tool</div>
    <h1>Image Link<br><span>Copier</span></h1>
    <p class="subtitle">// Browse & copy raw URLs from your repo's /images directory</p>
  </header>

  <div class="input-card">
    <label>GitHub Repository</label>
    <div class="input-row">
      <input type="text" id="repoInput" placeholder="owner/repo  e.g. torvalds/linux" autocomplete="off" spellcheck="false"/>
      <input type="text" id="branchInput" placeholder="branch (default: main)" style="max-width:180px;" autocomplete="off"/>
      <button class="btn" onclick="loadImages()">Load Images</button>
    </div>
    <p class="hint">
      Fetches all images from <code>/images</code> in the repo via GitHub API.
      Supports <code>.png .jpg .jpeg .gif .svg .webp .ico .avif</code>
    </p>
  </div>

  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div class="status-bar" id="statusBar"></div>
  <div id="output">
    <div class="state-box">
      <div class="icon">📁</div>
      <p>Enter a GitHub repository above<br>and click <strong>Load Images</strong></p>
    </div>
  </div>
</div>

<div id="toast">✓ Copied!</div>

<script>
  const IMAGE_EXTS = ['png','jpg','jpeg','gif','svg','webp','ico','avif','bmp','tiff'];

  async function loadImages() {
    const repo   = document.getElementById('repoInput').value.trim().replace(/^https?:\/\/github\.com\//,'').replace(/\/$/,'');
    const branch = document.getElementById('branchInput').value.trim() || 'main';
    const out    = document.getElementById('output');
    const errBox = document.getElementById('errorBox');
    const status = document.getElementById('statusBar');

    errBox.style.display = 'none';
    status.innerHTML = '';

    if (!repo || !repo.includes('/')) {
      showError('Enter a valid repo in the format <strong>owner/repo</strong>');
      return;
    }

    out.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Fetching /images from <strong>${repo}</strong>…</p></div>`;

    const apiUrl = `https://api.github.com/repos/${repo}/contents/images?ref=${branch}`;

    try {
      const res = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (!res.ok) {
        const msg = res.status === 404
          ? `Repository <strong>${repo}</strong> or branch <strong>${branch}</strong> not found, or <code>/images</code> directory doesn't exist.`
          : `GitHub API error: ${res.status} ${res.statusText}`;
        showError(msg); out.innerHTML = ''; return;
      }

      const items = await res.json();
      const images = items.filter(f =>
        f.type === 'file' && IMAGE_EXTS.includes(f.name.split('.').pop().toLowerCase())
      );

      if (images.length === 0) {
        out.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>No image files found in <code>/${repo}/images</code><br>on branch <strong>${branch}</strong>.</p></div>`;
        status.innerHTML = `<span>0 images found in <code>/images</code></span>`;
        return;
      }

      status.innerHTML = `<span><span class="count">${images.length}</span> image${images.length !== 1 ? 's' : ''} found in <code>/images</code> · branch: <code>${branch}</code></span>
        <button class="btn secondary" onclick="copyAll()" style="padding:6px 14px;font-size:11px;">Copy All URLs</button>`;

      out.innerHTML = `<div class="grid" id="grid"></div>`;
      const grid = document.getElementById('grid');

      images.forEach((img, i) => {
        const rawUrl = img.download_url;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 40}ms`;
        card.style.animation = 'fadeUp 0.4s ease both';

        const ext = img.name.split('.').pop().toLowerCase();
        const isRaster = ['png','jpg','jpeg','gif','webp','avif','bmp'].includes(ext);

        card.innerHTML = `
          <div class="thumb-wrap">
            ${isRaster || ext === 'svg'
              ? `<img src="${rawUrl}" alt="${img.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              : ''}
            <div class="img-placeholder" style="display:${isRaster || ext==='svg' ? 'none':'flex'}">🖼️</div>
          </div>
          <div class="copied-badge">Copied!</div>
          <div class="card-body">
            <div class="filename" title="${img.name}">${img.name}</div>
            <div class="copy-url" title="${rawUrl}">${rawUrl}</div>
            <button class="copy-btn" onclick="copyLink('${rawUrl}', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy URL
            </button>
          </div>`;

        card.dataset.url = rawUrl;
        grid.appendChild(card);
      });

    } catch (e) {
      showError(`Network error: ${e.message}`);
      out.innerHTML = '';
    }
  }

  function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      const card = btn.closest('.card');
      card.classList.add('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      showToast('✓ Copied!');
      setTimeout(() => {
        card.classList.remove('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy URL`;
      }, 2000);
    });
  }

  function copyAll() {
    const cards = document.querySelectorAll('.card[data-url]');
    const urls  = [...cards].map(c => c.dataset.url).join('\n');
    navigator.clipboard.writeText(urls).then(() => showToast(`✓ Copied ${cards.length} URLs!`));
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.innerHTML = `⚠ ${msg}`;
    b.style.display = 'block';
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('repoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadImages();
  });
  document.getElementById('branchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadImages();
  });
</script>
</body>
</html>
