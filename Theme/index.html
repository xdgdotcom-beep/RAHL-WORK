<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Selection | Subash Shankar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .selection-panel {
            width: 100%;
            max-width: 900px;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        header {
            margin-bottom: 3.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .theme-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .theme-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-blue);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theme-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            background: #243147;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .theme-card:hover::before {
            opacity: 1;
        }

        .theme-card span {
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .arrow {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .theme-card:hover .arrow {
            transform: translateX(5px);
            color: var(--accent-blue);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        @media (max-width: 600px) {
            .selection-panel {
                padding: 1.5rem;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="selection-panel">
        <header>
            <h1>Subash Shankar</h1>
            <p>Select a digital interface to proceed</p>
        </header>
        
        <div class="theme-grid">
            <a href="theme1.html" class="theme-card"><span>Theme 01</span> <div class="arrow">→</div></a>
            <a href="theme2.html" class="theme-card"><span>Theme 02</span> <div class="arrow">→</div></a>
            <a href="theme3.html" class="theme-card"><span>Theme 03</span> <div class="arrow">→</div></a>
            <a href="theme4.html" class="theme-card"><span>Theme 04</span> <div class="arrow">→</div></a>
            <a href="theme5.html" class="theme-card"><span>Theme 05</span> <div class="arrow">→</div></a>
            <a href="theme6.html" class="theme-card"><span>Theme 06</span> <div class="arrow">→</div></a>
            <a href="theme7.html" class="theme-card"><span>Theme 07</span> <div class="arrow">→</div></a>
        </div>

        <footer>
            &copy; 2026 Subash Shankar | Professional Portfolio Interface
        </footer>
    </div>

</body>
</html>
