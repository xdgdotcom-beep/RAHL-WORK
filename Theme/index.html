<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Selection | Subash Shankar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080A0F;
            --panel: rgba(14, 18, 28, 0.85);
            --card: rgba(20, 26, 40, 0.9);
            --card-hover: rgba(26, 34, 52, 0.95);
            --gold: #C9A84C;
            --gold-dim: #8B6F30;
            --gold-light: #E2C374;
            --text: #F0EAD8;
            --text-dim: #6B7A90;
            --text-muted: #3D4A5C;
            --border: rgba(201, 168, 76, 0.12);
            --border-hover: rgba(201, 168, 76, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 15% 10%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 90%, rgba(56, 100, 180, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #0C0F18 0%, #080A0F 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grid texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .selection-panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            margin: 2rem;
            padding: 3.5rem 3.5rem 2.75rem;
            background: var(--panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow:
                0 0 0 1px rgba(201, 168, 76, 0.04),
                0 40px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* Top gold rule */
        .selection-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 4px 4px 0 0;
        }

        header {
            margin-bottom: 3rem;
        }

        .header-eyebrow {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .header-eyebrow::before,
        .header-eyebrow::after {
            content: '';
            flex: 1;
            max-width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim));
        }
        .header-eyebrow::after {
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            letter-spacing: 0.08em;
            color: var(--text);
            margin-bottom: 0.6rem;
            line-height: 1;
        }

        h1 em {
            font-style: italic;
            color: var(--gold);
            font-weight: 300;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.72rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 2.75rem;
        }

        .theme-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 3px;
            text-decoration: none;
            color: var(--text);
            font-weight: 400;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Left accent line */
        .theme-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dim));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Shimmer on hover */
        .theme-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.04) 60%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .theme-card:hover {
            background: var(--card-hover);
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow:
                0 12px 32px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(201, 168, 76, 0.08),
                inset 0 1px 0 rgba(201, 168, 76, 0.06);
        }

        .theme-card:hover::before { opacity: 1; }
        .theme-card:hover::after  { opacity: 1; }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .card-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--gold-dim);
            line-height: 1;
            transition: color 0.3s ease;
            letter-spacing: -0.02em;
        }

        .theme-card:hover .card-num {
            color: var(--gold);
        }

        .card-label {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .card-label-main {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text);
            transition: color 0.3s ease;
        }

        .card-label-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.58rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .theme-card:hover .card-label-main { color: var(--gold-light); }
        .theme-card:hover .card-label-sub  { color: var(--text-dim); }

        .arrow {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--gold-dim);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .theme-card:hover .arrow {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateX(3px);
            background: rgba(201,168,76,0.08);
        }

        footer {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.62rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-top: 1px solid rgba(201,168,76,0.08);
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold-dim);
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            .selection-panel {
                margin: 0;
                padding: 2rem 1.5rem 2rem;
                border-radius: 0;
                border-left: none;
                border-right: none;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .theme-grid {
                grid-template-columns: 1fr;
            }
            footer {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .footer-dot { display: none; }
        }
    </style>
</head>
<body>

    <div class="selection-panel">
        <header>
            <div class="header-eyebrow">Portfolio Interface</div>
            <h1>Subash <em>Shankar</em></h1>
            <p class="subtitle">Select a digital experience to proceed</p>
        </header>

        <div class="theme-grid">
            <a href="theme1.html" class="theme-card">
                <div class="card-left">
                    <div class="card-num">01</div>
                    <div class="card-label">
                        <span class="card-label-main">Theme One</span>
                        <span class="card-label-sub">Interface</span>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="theme2.html" class="theme-card">
                <div class="card-left">
                    <div class="card-num">02</div>
                    <div class="card-label">
                        <span class="card-label-main">Theme Two</span>
                        <span class="card-label-sub">Interface</span>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="theme3.html" class="theme-card">
                <div class="card-left">
                    <div class="card-num">03</div>
                    <div class="card-label">
                        <span class="card-label-main">Theme Three</span>
                        <span class="card-label-sub">Interface</span>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="theme4.html" class="theme-card">
                <div class="card-left">
                    <div class="card-num">04</div>
                    <div class="card-label">
                        <span class="card-label-main">Theme Four</span>
                        <span class="card-label-sub">Interface</span>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="theme5.html" class="theme-card">
                <div class="card-left">
                    <div class="card-num">05</div>
                    <div class="card-label">
                        <span class="card-label-main">Theme Five</span>
                        <span class="card-label-sub">Interface</span>
                    </div>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>

        <footer>
            <span>&copy; 2026 Subash Shankar</span>
            <div class="footer-dot"></div>
            <span>Professional Portfolio Interface</span>
        </footer>
    </div>

</body>
</html>
